server:
  port: 8080
  
eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      default-zone: http://localhost:8761/eureka
  instance:
    hostname: localhost

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      default-filters:
        - TokenRelay
      routes:
        - id: tool-service
          uri: lb://tool-service
          predicates:
            - Path=/api/tools/**, /api/tool-items/**, /api/categories/**
        - id: book-service
          uri: lb://book-service
          predicates:
            - Path=/book/**
        - id: pet-service
          uri: lb://pet-service
          predicates:
            - Path=/pet/**
  security:
    oauth2:
      client:
        provider:
          keycloak:
            # En local usas localhost, en Minikube usarás el nombre del servicio
            issuer-uri: http://localhost:8085/realms/ToolRent
        registration:
          keycloak:
            client-id: gateway-client
            client-secret: zMYHsXfBqJ3lDhGoaOp0iGUnsTHGVOjJ
            scope: openid, profile, email